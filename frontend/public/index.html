<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StartupAnalyzer — AI-Powered Startup Intelligence</title>
    <meta name="description" content="Transform your startup idea into a full investor-ready analysis in minutes." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
      html { font-size:16px; }
      body {
        font-family:'Inter',sans-serif;
        background:#050510;
        color:#f1f5f9;
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        overflow-x:hidden;
      }
      ::-webkit-scrollbar { width:5px; height:5px; }
      ::-webkit-scrollbar-track { background:#050510; }
      ::-webkit-scrollbar-thumb { background:linear-gradient(#6366f1,#8b5cf6); border-radius:3px; }
      ::selection { background:rgba(99,102,241,0.3); color:#f1f5f9; }
      button { font-family:'Inter',sans-serif; }
      textarea { font-family:'Inter',sans-serif; }
      input { font-family:'Inter',sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
